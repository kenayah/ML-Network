<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#1a365d"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#hero-bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <g opacity="0.2">
    <line x1="200" y1="100" x2="800" y2="400" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="400" y1="100" x2="1000" y2="500" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="600" y1="100" x2="1200" y2="600" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="1200" y1="980" x2="600" y2="680" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="1400" y1="980" x2="800" y2="580" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="1600" y1="980" x2="1000" y2="480" stroke="#4fc3f7" stroke-width="1"/>
    <circle cx="800" cy="400" r="3" fill="#4fc3f7"/>
    <circle cx="1000" cy="500" r="3" fill="#4fc3f7"/>
    <circle cx="1200" cy="600" r="3" fill="#4fc3f7"/>
    <circle cx="600" cy="680" r="3" fill="#4fc3f7"/>
    <circle cx="800" cy="580" r="3" fill="#4fc3f7"/>
    <circle cx="1000" cy="480" r="3" fill="#4fc3f7"/>
  </g>
</svg>

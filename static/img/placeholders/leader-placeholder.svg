<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="400" height="400" fill="url(#bg)"/>
  <rect width="400" height="400" fill="url(#light)"/>
  
  <g opacity="0.6">
    <circle cx="200" cy="150" r="60" fill="#1e293b"/>
    <ellipse cx="200" cy="300" rx="90" ry="70" fill="#1e293b"/>
    
    <circle cx="200" cy="150" r="55" fill="#334155"/>
    <ellipse cx="200" cy="300" rx="85" ry="65" fill="#334155"/>
  </g>

<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="cable" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <radialGradient id="light1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="light2" cx="70%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#light1)"/>
  <rect width="800" height="500" fill="url(#light2)"/>
  
  <g opacity="0.6">
    <path d="M0 150 Q 200 100, 400 150 T 800 150" stroke="url(#cable)" stroke-width="8" fill="none"/>
    <path d="M0 250 Q 200 200, 400 250 T 800 250" stroke="url(#cable)" stroke-width="6" fill="none"/>
    <path d="M0 350 Q 200 300, 400 350 T 800 350" stroke="url(#cable)" stroke-width="4" fill="none"/>
    
    <circle cx="200" cy="150" r="15" fill="#3b82f6"/>
    <circle cx="400" cy="150" r="15" fill="#3b82f6"/>
    <circle cx="600" cy="150" r="15" fill="#3b82f6"/>
    
    <circle cx="150" cy="250" r="10" fill="#34d399"/>
    <circle cx="350" cy="250" r="10" fill="#34d399"/>
    <circle cx="550" cy="250" r="10" fill="#34d399"/>
    
    <line x1="200" y1="150" x2="150" y2="250" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
    <line x1="400" y1="150" x2="350" y2="250" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  </g>
  
  <g opacity="0.3">
    <rect x="50" y="50" width="700" height="400" rx="20" stroke="#60a5fa" stroke-width="2" fill="none"/>
    <circle cx="100" cy="100" r="8" fill="#60a5fa"/>
    <circle cx="700" cy="100" r="8" fill="#60a5fa"/>
    <circle cx="100" cy="400" r="8" fill="#60a5fa"/>
    <circle cx="700" cy="400" r="8" fill="#60a5fa"/>
  </g>

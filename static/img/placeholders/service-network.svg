<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="50%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="fibre" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#6ee7b7"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <radialGradient id="light1" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#light1)"/>
  
  <g opacity="0.7">
    <path d="M0 200 C 200 100, 600 300, 800 200" stroke="url(#fibre)" stroke-width="10" fill="none"/>
    <path d="M0 250 C 200 150, 600 350, 800 250" stroke="url(#fibre)" stroke-width="6" fill="none" opacity="0.6"/>
    <path d="M0 300 C 200 200, 600 400, 800 300" stroke="url(#fibre)" stroke-width="4" fill="none" opacity="0.4"/>
    
    <circle cx="100" cy="180" r="20" fill="#34d399"/>
    <circle cx="300" cy="220" r="20" fill="#34d399"/>
    <circle cx="500" cy="260" r="20" fill="#34d399"/>
    <circle cx="700" cy="220" r="20" fill="#34d399"/>
    
    <circle cx="100" cy="180" r="10" fill="#a7f3d0"/>
    <circle cx="300" cy="220" r="10" fill="#a7f3d0"/>
    <circle cx="500" cy="260" r="10" fill="#a7f3d0"/>
    <circle cx="700" cy="220" r="10" fill="#a7f3d0"/>
    
    <line x1="100" y1="180" x2="300" y2="220" stroke="#6ee7b7" stroke-width="3" opacity="0.5"/>
    <line x1="300" y1="220" x2="500" y2="260" stroke="#6ee7b7" stroke-width="3" opacity="0.5"/>
    <line x1="500" y1="260" x2="700" y2="220" stroke="#6ee7b7" stroke-width="3" opacity="0.5"/>
  </g>
  
  <g opacity="0.2">
    <rect x="0" y="0" width="800" height="500" fill="url(#fibre)" opacity="0.1"/>
    <path d="M0 0 L800 500" stroke="#34d399" stroke-width="1"/>
    <path d="M800 0 L0 500" stroke="#34d399" stroke-width="1"/>
  </g>
</svg>

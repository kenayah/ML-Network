{{ define "main" }}
<section class="single-page-hero">
  <div class="single-page-overlay"></div>
  <div class="single-page-content">
    <h1>{{ .Title }}</h1>
  </div>
</section>

<section class="single-page-body">
  <div class="single-page-inner">
    {{ .Content }}
  </div>
</section>
{{ end }}

<style>
/* Basic styling for single pages */
.content-wrapper {
  padding-top: 64px; /* Adjust based on header height */
  min-height: calc(100vh - 64px - 100px); /* Adjust footer height if needed */
  background: var(--brand-dark); /* Ensure background is dark */
}

.single-page-hero {
  position: relative;
  min-height: 30vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  background: url('https://images.unsplash.com/photo-1517032207904-b1525e59b342?w=1920&q=80') center/cover no-repeat;
}

.single-page-overlay {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.7);
}

.single-page-content {
  position: relative;
  z-index: 2;
  color: var(--white);
}

.single-page-content h1 {
  font-size: clamp(32px, 5vw, 64px);
  font-weight: 800;
  letter-spacing: -1.5px;
}

.single-page-body {
  padding: 80px 24px;
  max-width: 900px;
  margin: 0 auto;
  color: rgba(255, 255, 255, 0.7);
  font-size: 16px;
  line-height: 1.8;
}

.single-page-body h2 {
  font-size: clamp(24px, 3vw, 36px);
  font-weight: 700;
  margin-top: 40px;
  margin-bottom: 20px;
  color: var(--white);
}

.single-page-body h3 {
  font-size: clamp(20px, 2.5vw, 28px);
  font-weight: 600;
  margin-top: 30px;
  margin-bottom: 15px;
  color: var(--white);
}

.single-page-body p {
  margin-bottom: 20px;
}

.single-page-body ul {
  list-style: disc;
  margin-left: 20px;
  margin-bottom: 20px;
}

.single-page-body li {
  margin-bottom: 8px;
}

@media (max-width: 768px) {
  .single-page-hero {
    min-height: 25vh;
  }
  .single-page-content h1 {
    font-size: clamp(28px, 10vw, 42px);
  }
  .single-page-body {
    padding: 40px 20px;
    font-size: 15px;
  }
}
</style>
